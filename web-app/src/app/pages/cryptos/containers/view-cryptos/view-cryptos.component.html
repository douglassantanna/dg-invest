<main>
  <header>
    <div class="coll-1">
      <h1>Cryptos</h1>
    </div>

    <ng-container *ngIf="!emptyCryptoList">
      <div class="coll-2">
        <app-crypto-filter (searchControlEvent)="search($event, hideZeroBalance)"
          (hideZeroBalanceControlEvent)="search('', hideZeroBalance = $event)" [setBalanceStatus]="setBalanceStatus">
        </app-crypto-filter>
      </div>

      <div class="coll-3">
        <app-button [loading]="true" [text]="'Add asset'" (submit)="openModal()"></app-button>
      </div>
    </ng-container>
  </header>

  <div *ngIf="cryptos$ | async as cryptos;">
    <div class="col-md-12">
      <app-crypto-table [cryptos]="cryptos" [hideZeroBalance]="hideZeroBalance" />
    </div>
  </div>

  <ng-container *ngIf="emptyCryptoList">
    <div class="text-center">
      <h2>No assets found 😥</h2>
      <app-button [loading]="true" [text]="'Add asset'" (submit)="openModal()"></app-button>
    </div>
  </ng-container>
</main>

<style>
  main {
    display: flex;
    flex-direction: column;
    padding: 10px;
  }

  header {
    display: flex;
    flex-wrap: wrap;
  }

  .coll-1,
  .coll-2,
  .coll-3 {
    padding: 5px 0px 5px 5px;
  }

  .coll-1 {
    width: 50%;
  }

  .coll-2 {
    width: 40%;
  }

  .coll-3 {
    width: 10%;
    display: flex;
    justify-content: flex-end;
  }

  @media screen and (max-width: 768px) {
    .coll-1 {
      width: 70%;
      justify-content: space-between;
      order: 1;
    }

    .coll-2 {
      flex: 1;
      width: 100%;
      order: 3;
    }

    .coll-3 {
      width: 30%;
      order: 2;
      display: flex;
      justify-content: flex-end;
    }
  }
</style>
