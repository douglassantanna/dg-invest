<div class="row-container">
  <div class="col-container">
    <div class="form-check">
      <input class="form-check-input" type="radio" name="flexRadioDefault" id="flexRadioDefault1" [value]="!tableView"
        [formControl]="viewDataTable">
      <label class="form-check-label" for="flexRadioDefault1">
        Card view
      </label>
    </div>
    <div class="form-check">
      <input class="form-check-input" type="radio" name="flexRadioDefault" id="flexRadioDefault2" [value]="tableView"
        [formControl]="viewDataTable">
      <label class="form-check-label" for="flexRadioDefault2">
        Table view
      </label>
    </div>
  </div>
  <div class="col-container">
    <div class="form-check form-switch">
      <input class="form-check-input" type="checkbox" id="gridCheck" [formControl]="showZeroBalance">
      <label class="form-check-label" for="gridCheck">
        Hide zero balance cryptos
      </label>
    </div>
  </div>
  <div class="col-container flex-grow-1">
    <input class="form-control" placeholder="Search by name.." aria-label="Search" type="text"
      [formControl]="searchControl">
  </div>
</div>


<style>
  .row-container {
    display: flex;
    align-items: center;
  }

  .col-container {
    margin-right: 15px;
  }

  .form-check {
    margin-right: 10px;
  }

  .form-check-label {
    margin-left: 5px;
  }

  .form-check.form-switch .form-check-input {
    padding: 0;
    margin-right: 5px;
  }

  .flex-grow-1 {
    flex-grow: 1;
  }
</style>
