<div class="row-container">
  <div class="first-container">
    <select name="sort" disabled>
      <option value="">Sort by..</option>
    </select>
    <div class="gridCheck">
      <input type="checkbox" id="gridCheck" [formControl]="showZeroBalance">
      <label for="gridCheck">
        Hide zero balance
      </label>
    </div>
  </div>
  <div class="search">
    <input placeholder="Search by name.." aria-label="Search" type="text" [formControl]="searchControl">
  </div>
</div>

<style>
  .row-container {
    display: flex;
    justify-content: flex-start;
    flex-direction: column;
  }

  .first-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 10px;
    flex-wrap: nowrap;
    gap: 10px;
  }

  select {
    width: 50%;
  }

  .gridCheck {
    width: 100%;
    display: flex;
    gap: 5px;
  }

  .search {
    width: 100%;
  }

  @media screen and (max-width: 768px) {
    .first-container {
      flex-wrap: wrap;
    }
  }
</style>
